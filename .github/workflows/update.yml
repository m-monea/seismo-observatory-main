name: Update Seismic Data

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch data (generate JSON)
        run: python src/fetch_usgs.py

      - name: Validate outputs (fail if empty/invalid)
        run: |
          ls -la docs
          test -s docs/events.json
          test -s docs/grid.json
          python -m json.tool docs/events.json > /dev/null
          python -m json.tool docs/grid.json > /dev/null
          echo "JSON validation OK"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/events.json docs/grid.json docs/italy_events.json docs/italy_grid.json docs/backtest.json
          git status
          git commit -m "Update seismic data" || echo "No changes to commit"
          git push
